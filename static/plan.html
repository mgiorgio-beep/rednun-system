const STATUS = {
  done: { color: "#22c55e", bg: "#052e16", label: "DONE" },
  progress: { color: "#f59e0b", bg: "#451a03", label: "IN PROGRESS" },
  planned: { color: "#94a3b8", bg: "#1e293b", label: "PLANNED" },
  future: { color: "#6366f1", bg: "#1e1b4b", label: "FUTURE" },
  active: { color: "#ef4444", bg: "#450a0a", label: "ACTIVE" },
};

function StatusPill({ status }) {
  const s = STATUS[status];
  return React.createElement("span", { style: {
    display: "inline-block", padding: "2px 8px", borderRadius: 9999,
    fontSize: 9, fontWeight: 700, letterSpacing: 1,
    color: s.color, background: s.bg,
    border: `1px solid ${s.color}33`, textTransform: "uppercase",
  }}, s.label);
}

function getProgress(node) {
  if (!node.children) return node.status === "done" ? 100 : 0;
  const done = node.children.filter(c => c.status === "done").length;
  return Math.round((done / node.children.length) * 100);
}

function ProgressRing({ pct, size = 32 }) {
  const r = (size - 4) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  const color = pct === 100 ? "#22c55e" : pct > 50 ? "#f59e0b" : "#94a3b8";
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={3} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={3}
        strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
        style={{ transition: "stroke-dashoffset 0.5s ease" }} />
      <text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central"
        fill={color} fontSize={9} fontWeight={700}
        style={{ transform: "rotate(90deg)", transformOrigin: "center" }}>{pct}%</text>
    </svg>
  );
}

function LeafNode({ item }) {
  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 8,
      padding: "6px 12px", background: "#0f172a",
      borderRadius: 6, borderLeft: `3px solid ${STATUS[item.status].color}`,
      fontSize: 13,
    }}>
      <span style={{ color: "#e2e8f0", fontWeight: 600, flex: 1 }}>{item.name}</span>
      <span style={{ color: "#64748b", fontSize: 11, flex: 1.2 }}>{item.detail}</span>
      <StatusPill status={item.status} />
    </div>
  );
}

function BranchNode({ node, defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  const pct = getProgress(node);
  const doneCount = node.children.filter(c => c.status === "done").length;
  const totalCount = node.children.length;

  React.useEffect(() => { setOpen(defaultOpen); }, [defaultOpen]);

  return (
    <div style={{ position: "relative" }}>
      <div onClick={() => setOpen(!open)} style={{
        display: "flex", alignItems: "center", gap: 12,
        padding: "10px 16px",
        background: open ? "#1e293b" : "#0f172a",
        border: `1px solid ${open ? STATUS[node.status].color + "55" : "#1e293b"}`,
        borderRadius: 10, cursor: "pointer",
        transition: "all 0.2s ease", userSelect: "none",
      }}>
        <span style={{ fontSize: 22 }}>{node.icon}</span>
        <ProgressRing pct={pct} />
        <div style={{ flex: 1 }}>
          <div style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 15 }}>{node.name}</div>
          <div style={{ color: "#64748b", fontSize: 11, marginTop: 1 }}>{doneCount}/{totalCount} complete</div>
        </div>
        <StatusPill status={node.status} />
        <span style={{
          color: "#475569", fontSize: 18, fontWeight: 300,
          transform: open ? "rotate(90deg)" : "rotate(0deg)",
          transition: "transform 0.2s ease",
        }}>&rsaquo;</span>
      </div>
      {open && (
        <div style={{
          marginLeft: 24, paddingLeft: 16,
          borderLeft: "2px solid #1e293b",
          marginTop: 4, display: "flex", flexDirection: "column", gap: 3,
          paddingTop: 4, paddingBottom: 4,
        }}>
          {node.children.map((child, i) => (
            <div key={i} style={{ position: "relative" }}>
              <div style={{
                position: "absolute", left: -17, top: 14,
                width: 12, height: 2, background: "#1e293b",
              }} />
              <LeafNode item={child} />
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SummaryBar() {
  let total = 0, done = 0, prog = 0, plan = 0, fut = 0;
  DATA.children.forEach(branch => {
    branch.children.forEach(leaf => {
      total++;
      if (leaf.status === "done") done++;
      else if (leaf.status === "progress") prog++;
      else if (leaf.status === "planned") plan++;
      else fut++;
    });
  });
  const pct = Math.round((done / total) * 100);

  return (
    <div style={{
      display: "flex", gap: 16, alignItems: "center", justifyContent: "center",
      flexWrap: "wrap", padding: "16px 0",
    }}>
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 36, fontWeight: 800, color: "#22c55e", lineHeight: 1 }}>{pct}%</div>
        <div style={{ fontSize: 10, color: "#64748b", letterSpacing: 1, marginTop: 4 }}>COMPLETE</div>
      </div>
      <div style={{ width: 1, height: 40, background: "#1e293b" }} />
      {[
        { n: done, label: "Done", color: "#22c55e" },
        { n: prog, label: "In Progress", color: "#f59e0b" },
        { n: plan, label: "Planned", color: "#94a3b8" },
        { n: fut, label: "Future", color: "#6366f1" },
      ].map((s, i) => (
        <div key={i} style={{ textAlign: "center", minWidth: 60 }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: s.color, lineHeight: 1 }}>{s.n}</div>
          <div style={{ fontSize: 9, color: "#64748b", letterSpacing: 0.5, marginTop: 3 }}>{s.label}</div>
        </div>
      ))}
      <div style={{ width: 1, height: 40, background: "#1e293b" }} />
      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 22, fontWeight: 700, color: "#e2e8f0", lineHeight: 1 }}>{total}</div>
        <div style={{ fontSize: 9, color: "#64748b", letterSpacing: 0.5, marginTop: 3 }}>Total Items</div>
      </div>
    </div>
  );
}

function Roadmap() {
  const phases = [
    { name: "Core Platform", status: "done", items: ["Toast sync", "Invoice scanner", "Product mapping", "Recipe costing"] },
    { name: "Inventory Ops", status: "done", items: ["Product setup", "AI Smart Count", "Storage", "Order guide"] },
    { name: "Cost Control", status: "progress", items: ["Sub-recipes", "Par levels", "Net sales match"] },
    { name: "Bill Pay", status: "progress", items: ["Payment scheduling", "GL codes", "QuickBooks"] },
    { name: "Advanced", status: "future", items: ["7shifts routes", "Menu engineering", "Mobile overhaul"] },
  ];

  return (
    <div style={{ display: "flex", gap: 6, overflowX: "auto", padding: "8px 0" }}>
      {phases.map((p, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{
            background: STATUS[p.status].bg,
            border: `1px solid ${STATUS[p.status].color}33`,
            borderRadius: 8, padding: "10px 14px",
            minWidth: 140, flex: "0 0 auto",
          }}>
            <div style={{ fontSize: 10, color: STATUS[p.status].color, fontWeight: 700, letterSpacing: 1, marginBottom: 4 }}>
              PHASE {i + 1}
            </div>
            <div style={{ fontSize: 13, color: "#f1f5f9", fontWeight: 600, marginBottom: 6 }}>{p.name}</div>
            {p.items.map((item, j) => (
              <div key={j} style={{ fontSize: 10, color: "#94a3b8", lineHeight: 1.6 }}>{"\u2022"} {item}</div>
            ))}
          </div>
          {i < phases.length - 1 && (
            <span style={{ color: "#334155", fontSize: 18, flexShrink: 0 }}>{"\u2192"}</span>
          )}
        </div>
      ))}
    </div>
  );
}

function App() {
  const [expandAll, setExpandAll] = useState(false);

  return (
    <div style={{
      minHeight: "100vh", background: "#020617",
      color: "#e2e8f0", fontFamily: "'JetBrains Mono', monospace",
    }}>
      <div style={{ maxWidth: 800, margin: "0 auto", padding: "24px 16px" }}>
        <div style={{ textAlign: "center", marginBottom: 8 }}>
          <div style={{
            display: "inline-block", padding: "4px 16px",
            background: "#450a0a", borderRadius: 6,
            border: "1px solid #ef444433", marginBottom: 12,
          }}>
            <span style={{ color: "#ef4444", fontSize: 10, fontWeight: 700, letterSpacing: 2 }}>
              RED NUN BAR & GRILL
            </span>
          </div>
          <h1 style={{
            fontSize: 28, fontWeight: 800, color: "#f8fafc",
            margin: "0 0 4px 0", letterSpacing: -0.5,
          }}>Dashboard Project Tree</h1>
          <p style={{ color: "#64748b", fontSize: 12, margin: 0 }}>
            Dennis Port & Chatham, MA — Updated Mar 1, 2026
          </p>
        </div>

        <SummaryBar />

        <div style={{
          background: "#0f172a", borderRadius: 10,
          padding: "14px 16px", marginBottom: 16,
          border: "1px solid #1e293b",
        }}>
          <div style={{ fontSize: 10, color: "#64748b", fontWeight: 700, letterSpacing: 1.5, marginBottom: 8 }}>
            ROADMAP
          </div>
          <Roadmap />
        </div>

        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
          <button onClick={() => setExpandAll(!expandAll)} style={{
            background: "none", border: "1px solid #334155",
            color: "#94a3b8", padding: "4px 12px", borderRadius: 6,
            fontSize: 11, cursor: "pointer", fontFamily: "inherit",
          }}>
            {expandAll ? "Collapse All" : "Expand All"}
          </button>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {DATA.children.map((branch, i) => (
            <BranchNode key={i} node={branch} defaultOpen={expandAll} />
          ))}
        </div>

        <div style={{
          textAlign: "center", marginTop: 32, paddingTop: 16,
          borderTop: "1px solid #1e293b",
          color: "#334155", fontSize: 10,
        }}>
          dashboard.rednun.com — Replacing MarginEdge at $0.05/invoice
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
