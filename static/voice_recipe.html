<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#020617">
<title>Red Nun — Voice Recipe Builder</title>
<style>
:root {
  --bg: #020617;
  --card: #0f172a;
  --border: #1e293b;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #475569;
  --green: #22c55e;
  --red: #ef4444;
  --amber: #f59e0b;
  --blue: #38bdf8;
  --r: 16px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 500px; margin: 0 auto; padding: 20px 16px; }
.header {
  text-align: center;
  padding: 20px 0 24px;
}
.header h1 { font-size: 22px; font-weight: 700; }
.header p { font-size: 13px; color: var(--text2); margin-top: 4px; }

/* States */
.state { display: none; }
.state.active { display: block; }

/* Record button */
.record-area { text-align: center; padding: 40px 0; }
.rec-btn {
  width: 120px; height: 120px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(239,68,68,0.35);
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 4px;
}
.rec-btn:active { transform: scale(0.95); }
.rec-btn.recording {
  animation: pulse 1.5s ease-in-out infinite;
  background: linear-gradient(135deg, #dc2626, #b91c1c);
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
  50% { box-shadow: 0 0 0 20px rgba(239,68,68,0); }
}
.rec-btn svg { width: 32px; height: 32px; }
.rec-hint { font-size: 13px; color: var(--text3); margin-top: 16px; }
.rec-timer { font-size: 28px; font-weight: 700; color: var(--red); margin-top: 12px; font-variant-numeric: tabular-nums; }

/* Process button */
.process-btn {
  display: none;
  width: 100%;
  padding: 14px;
  border-radius: var(--r);
  border: none;
  background: linear-gradient(135deg, var(--blue), #0284c7);
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 20px;
}
.process-btn:active { transform: scale(0.98); }

/* Processing state */
.processing-state { text-align: center; padding: 60px 0; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.process-status { font-size: 14px; color: var(--text2); }

/* Review state */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 12px;
}
.field-label { font-size: 11px; color: var(--text3); font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.field-input {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
}
.field-input:focus { outline: none; border-color: var(--blue); }

.ing-card {
  background: rgba(30,41,59,0.5);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
}
.ing-name { font-weight: 600; font-size: 14px; margin-bottom: 8px; }
.ing-row { display: flex; gap: 8px; margin-bottom: 8px; }
.ing-row .field-input { flex: 1; }
.match-badge {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
}
.match-auto { background: rgba(34,197,94,0.15); color: var(--green); }
.match-suggest { background: rgba(245,158,11,0.15); color: var(--amber); }
.match-new { background: rgba(239,68,68,0.15); color: var(--red); }

.save-btn {
  width: 100%;
  padding: 14px;
  border-radius: var(--r);
  border: none;
  background: linear-gradient(135deg, var(--green), #16a34a);
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 12px;
}
.save-btn:active { transform: scale(0.98); }

/* Saved state */
.saved-state { text-align: center; padding: 40px 0; }
.saved-icon { font-size: 48px; margin-bottom: 16px; }
.saved-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.saved-cost { font-size: 14px; color: var(--text2); margin-bottom: 24px; }
.link-btn {
  display: inline-block;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  border: none;
  margin: 0 6px;
}
.link-btn.primary { background: var(--blue); color: white; }
.link-btn.secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }

/* Back link */
.back-link {
  display: inline-block;
  color: var(--text2);
  font-size: 13px;
  text-decoration: none;
  padding: 8px 0;
}

/* Autocomplete dropdown */
.ac-wrap { position: relative; flex: 2; }
.ac-list {
  display: none;
  position: absolute;
  top: 100%;
  left: 0; right: 0;
  z-index: 100;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-top: 4px;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.ac-list.open { display: block; }
.ac-item {
  padding: 12px 14px;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  min-height: 44px;
  display: flex;
  align-items: center;
}
.ac-item:last-child { border-bottom: none; }
.ac-item:active { background: rgba(56,189,248,0.12); }
.ac-item .ac-sub { font-size: 11px; color: var(--text3); margin-left: auto; padding-left: 8px; white-space: nowrap; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="/manage" class="back-link">&larr; Back to Dashboard</a>
    <h1>Voice Recipe Builder</h1>
    <p>Speak your recipe, we'll do the rest</p>
  </div>

  <!-- State 1: Ready / Recording -->
  <div class="state active" id="state-record">
    <div class="record-area">
      <button class="rec-btn" id="recBtn" onclick="toggleRecording()">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <span id="recBtnText">Record</span>
      </button>
      <div class="rec-hint" id="recHint">Tap, then speak your recipe naturally</div>
      <div class="rec-timer" id="recTimer" style="display:none">00:00</div>
    </div>
    <button class="process-btn" id="processBtn" onclick="processRecording()">Process Recipe</button>
  </div>

  <!-- State 2: Processing -->
  <div class="state" id="state-processing">
    <div class="processing-state">
      <div class="spinner"></div>
      <div class="process-status" id="processStatus">Transcribing audio...</div>
    </div>
  </div>

  <!-- State 3: Review -->
  <div class="state" id="state-review">
    <div class="card">
      <div class="field-label">Transcript</div>
      <div id="transcript" style="font-size:13px;color:var(--text2);font-style:italic;padding:8px 0"></div>
    </div>
    <div class="card">
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div style="flex:2">
          <div class="field-label">Recipe Name</div>
          <input type="text" class="field-input" id="recipeName">
        </div>
        <div style="flex:1">
          <div class="field-label">Category</div>
          <select class="field-input" id="recipeCategory">
            <option>APPETIZER</option>
            <option>ENTREE</option>
            <option>DESSERT</option>
            <option selected>FOOD</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1">
          <div class="field-label">Servings</div>
          <input type="number" class="field-input" id="recipeServings" value="1" min="1" step="1">
        </div>
        <div style="flex:1">
          <div class="field-label">Menu Price ($)</div>
          <input type="number" class="field-input" id="recipeMenuPrice" value="0" min="0" step="0.01">
        </div>
      </div>
    </div>
    <div class="field-label" style="padding:4px 0 8px">Ingredients</div>
    <div id="ingredientsList"></div>
    <button class="save-btn" onclick="saveRecipe()">Save Recipe</button>
    <button onclick="resetToRecord()" style="width:100%;padding:12px;border-radius:var(--r);border:1px solid var(--border);background:transparent;color:var(--text2);font-size:14px;cursor:pointer;margin-top:8px">Start Over</button>
  </div>

  <!-- State 4: Saved -->
  <div class="state" id="state-saved">
    <div class="saved-state">
      <div class="saved-icon">&#10003;</div>
      <div class="saved-title" id="savedTitle">Recipe Saved!</div>
      <div class="saved-cost" id="savedCost"></div>
      <a href="/manage" class="link-btn primary">View Recipes</a>
      <button class="link-btn secondary" onclick="resetToRecord()">Record Another</button>
    </div>
  </div>
</div>

<script>
let mediaRecorder = null;
let audioChunks = [];
let recording = false;
let timerInterval = null;
let seconds = 0;
let parsedData = null;
let matchesData = null;
let audioMimeType = 'audio/webm;codecs=opus';

// Detect supported codec
if (typeof MediaRecorder !== 'undefined') {
  if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
    audioMimeType = 'audio/webm;codecs=opus';
  } else {
    audioMimeType = 'audio/mp4';
  }
}

function setState(name) {
  document.querySelectorAll('.state').forEach(s => s.classList.remove('active'));
  document.getElementById('state-' + name).classList.add('active');
}

async function toggleRecording() {
  if (recording) {
    stopRecording();
  } else {
    startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: audioMimeType });
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
    };

    mediaRecorder.start();
    recording = true;

    const btn = document.getElementById('recBtn');
    btn.classList.add('recording');
    document.getElementById('recBtnText').textContent = 'Stop';
    document.getElementById('recHint').textContent = 'Recording... tap to stop';
    document.getElementById('recTimer').style.display = 'block';
    document.getElementById('processBtn').style.display = 'none';
    seconds = 0;
    updateTimer();
    timerInterval = setInterval(() => { seconds++; updateTimer(); }, 1000);
  } catch(e) {
    alert('Microphone access denied. Please allow microphone access and try again.');
  }
}

function stopRecording() {
  if (mediaRecorder && recording) {
    mediaRecorder.stop();
    recording = false;
    clearInterval(timerInterval);

    const btn = document.getElementById('recBtn');
    btn.classList.remove('recording');
    document.getElementById('recBtnText').textContent = 'Record';
    document.getElementById('recHint').textContent = seconds + 's recorded. Tap Process to continue.';
    document.getElementById('processBtn').style.display = 'block';
  }
}

function updateTimer() {
  const m = Math.floor(seconds / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  document.getElementById('recTimer').textContent = m + ':' + s;
}

async function processRecording() {
  if (!audioChunks.length) return;

  setState('processing');
  document.getElementById('processStatus').textContent = 'Transcribing audio...';

  const ext = audioMimeType.includes('mp4') ? 'mp4' : 'webm';
  const blob = new Blob(audioChunks, { type: audioMimeType });
  const formData = new FormData();
  formData.append('audio', blob, 'recipe.' + ext);

  try {
    const resp = await fetch('/api/voice-recipe/process', { method: 'POST', body: formData });
    const data = await resp.json();

    if (data.error) throw new Error(data.error);

    document.getElementById('processStatus').textContent = 'Matching ingredients...';

    parsedData = data.parsed;
    matchesData = data.matches;

    // Populate review form
    document.getElementById('transcript').textContent = data.transcript;
    document.getElementById('recipeName').value = parsedData.name || '';
    document.getElementById('recipeServings').value = parsedData.servings || 1;

    // Set category
    const catSelect = document.getElementById('recipeCategory');
    const cat = (parsedData.category || 'FOOD').toUpperCase();
    for (let opt of catSelect.options) {
      if (opt.value === cat) { opt.selected = true; break; }
    }

    // Build ingredients list
    buildIngredientsList();

    setState('review');
  } catch(e) {
    alert('Error: ' + e.message);
    setState('record');
  }
}

function buildIngredientsList() {
  const list = document.getElementById('ingredientsList');
  const ingredients = parsedData.ingredients || [];
  const matches = matchesData || [];

  let html = '';
  for (let i = 0; i < ingredients.length; i++) {
    const ing = ingredients[i];
    const match = matches[i] || {};
    const badgeClass = match.match_type === 'auto' ? 'match-auto' : match.match_type === 'suggest' ? 'match-suggest' : 'match-new';
    const badgeText = match.match_type === 'auto' ? match.score + '% match' : match.match_type === 'suggest' ? match.score + '% suggest' : 'New product';
    const matchedName = match.product_name || ing.name;

    html += '<div class="ing-card" data-idx="' + i + '">' +
      '<div class="ing-name">' + ing.name + ' <span class="match-badge ' + badgeClass + '">' + badgeText + '</span></div>' +
      '<div class="ing-row">' +
        '<input type="number" class="field-input ing-qty" value="' + (ing.quantity || 1) + '" step="0.01" min="0" style="max-width:80px">' +
        '<select class="field-input ing-unit" style="max-width:100px">' +
          ['each','oz','lb','cup','tsp','tbsp','gallon','quart','pint','ml','l','g','kg'].map(u =>
            '<option' + (u === (ing.unit || 'each') ? ' selected' : '') + '>' + u + '</option>'
          ).join('') +
        '</select>' +
        '<div class="ac-wrap">' +
          '<input type="text" class="field-input ing-match" value="' + matchedName.replace(/"/g, '&quot;') + '" placeholder="Search product..." autocomplete="off">' +
          '<div class="ac-list"></div>' +
        '</div>' +
        '<input type="hidden" class="ing-pid" value="' + (match.product_id || '') + '">' +
      '</div>' +
    '</div>';
  }

  list.innerHTML = html;
}

async function saveRecipe() {
  const name = document.getElementById('recipeName').value.trim();
  if (!name) { alert('Recipe name is required'); return; }

  const category = document.getElementById('recipeCategory').value;
  const servings = parseFloat(document.getElementById('recipeServings').value) || 1;
  const menuPrice = parseFloat(document.getElementById('recipeMenuPrice').value) || 0;

  // Collect ingredients
  const cards = document.querySelectorAll('.ing-card');
  const ingredients = [];
  cards.forEach(card => {
    const pid = card.querySelector('.ing-pid').value;
    const qty = parseFloat(card.querySelector('.ing-qty').value) || 0;
    const unit = card.querySelector('.ing-unit').value;
    if (pid && qty > 0) {
      ingredients.push({ product_id: parseInt(pid), quantity: qty, unit: unit });
    }
  });

  try {
    const resp = await fetch('/api/voice-recipe/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, category, servings, menu_price: menuPrice, ingredients }),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    document.getElementById('savedTitle').textContent = name + ' saved!';
    const cost = data.cost;
    if (cost && cost.total_cost > 0) {
      let costText = 'Food cost: $' + cost.total_cost.toFixed(2);
      if (cost.cost_per_serving > 0) costText += ' ($' + cost.cost_per_serving.toFixed(2) + '/serving)';
      if (cost.food_cost_pct > 0) costText += ' — ' + cost.food_cost_pct.toFixed(1) + '%';
      document.getElementById('savedCost').textContent = costText;
    } else {
      document.getElementById('savedCost').textContent = 'Cost will calculate when ingredient prices are set up.';
    }

    setState('saved');
  } catch(e) {
    alert('Error saving: ' + e.message);
  }
}

function resetToRecord() {
  audioChunks = [];
  parsedData = null;
  matchesData = null;
  seconds = 0;
  document.getElementById('recTimer').style.display = 'none';
  document.getElementById('processBtn').style.display = 'none';
  document.getElementById('recHint').textContent = 'Tap, then speak your recipe naturally';
  setState('record');
}

// ─── Product Autocomplete ───
let _acTimer = null;
let _acActive = null; // currently open dropdown

function acCloseAll() {
  document.querySelectorAll('.ac-list.open').forEach(d => d.classList.remove('open'));
  _acActive = null;
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.ac-wrap')) acCloseAll();
});

document.addEventListener('focusin', function(e) {
  if (!e.target.classList.contains('ing-match')) return;
  const input = e.target;
  const wrap = input.closest('.ac-wrap');
  const dropdown = wrap.querySelector('.ac-list');

  // Close any other open dropdown
  acCloseAll();
  _acActive = dropdown;

  // Clear value on focus so user can type fresh
  input.value = '';
  input.dataset.prevVal = '';

  // Clear stored product_id since they're re-searching
  const card = input.closest('.ing-card');
  if (card) card.querySelector('.ing-pid').value = '';
});

document.addEventListener('input', function(e) {
  if (!e.target.classList.contains('ing-match')) return;
  const input = e.target;
  const query = input.value.trim();
  const wrap = input.closest('.ac-wrap');
  const dropdown = wrap.querySelector('.ac-list');

  if (_acTimer) clearTimeout(_acTimer);

  if (query.length < 2) {
    dropdown.classList.remove('open');
    dropdown.innerHTML = '';
    return;
  }

  _acTimer = setTimeout(function() { acFetch(query, input, dropdown); }, 200);
});

async function acFetch(query, input, dropdown) {
  try {
    const resp = await fetch('/api/inventory/products?search=' + encodeURIComponent(query));
    const products = await resp.json();

    // Check input still has focus and value matches
    if (document.activeElement !== input) return;

    const results = products.slice(0, 6);
    if (!results.length) {
      dropdown.innerHTML = '<div class="ac-item" style="color:var(--text3);font-style:italic;cursor:default">No products found</div>';
      dropdown.classList.add('open');
      return;
    }

    dropdown.innerHTML = results.map(function(p) {
      return '<div class="ac-item" data-pid="' + p.id + '" data-name="' + (p.name || '').replace(/"/g, '&quot;') + '">' +
        '<span>' + (p.name || '') + '</span>' +
        (p.category ? '<span class="ac-sub">' + p.category + '</span>' : '') +
        '</div>';
    }).join('');
    dropdown.classList.add('open');
  } catch(e) {
    dropdown.classList.remove('open');
  }
}

document.addEventListener('click', function(e) {
  const item = e.target.closest('.ac-item');
  if (!item || !item.dataset.pid) return;

  const wrap = item.closest('.ac-wrap');
  const input = wrap.querySelector('.ing-match');
  const dropdown = wrap.querySelector('.ac-list');
  const card = input.closest('.ing-card');

  input.value = item.dataset.name;
  card.querySelector('.ing-pid').value = item.dataset.pid;

  dropdown.classList.remove('open');
  dropdown.innerHTML = '';
  _acActive = null;

  // Update badge to show linked
  const badge = card.querySelector('.match-badge');
  if (badge) {
    badge.className = 'match-badge match-auto';
    badge.textContent = 'Linked';
  }
});
</script>
</body>
</html>
