<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tonight's Specials — Red Nun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredericka+the+Great&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
/* ── Reset ──────────────────────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Chalkboard Background ──────────────────────────────────────── */
html, body {
  width: 100%; height: 100%;
  background: #1a1a1a;
  overflow: hidden;
}

.board {
  width: 100vw; height: 100vh;
  background:
    /* fine chalk texture overlay */
    repeating-linear-gradient(
      0deg,
      transparent, transparent 2px,
      rgba(255,255,255,0.008) 2px, rgba(255,255,255,0.008) 3px
    ),
    repeating-linear-gradient(
      90deg,
      transparent, transparent 4px,
      rgba(255,255,255,0.004) 4px, rgba(255,255,255,0.004) 5px
    ),
    /* chalkboard green-black */
    linear-gradient(160deg, #1b3a2e 0%, #0f2318 40%, #0a1c10 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 32px 32px;
  position: relative;
}

/* ── Chalk border ───────────────────────────────────────────────── */
.board::before {
  content: '';
  position: absolute;
  inset: 18px;
  border: 3px solid rgba(240,235,210,0.25);
  border-radius: 4px;
  pointer-events: none;
}
.board::after {
  content: '';
  position: absolute;
  inset: 24px;
  border: 1.5px solid rgba(240,235,210,0.12);
  border-radius: 2px;
  pointer-events: none;
}

/* ── Logo / Header ──────────────────────────────────────────────── */
.board-logo {
  font-family: 'Fredericka the Great', serif;
  font-size: clamp(26px, 5vw, 52px);
  color: rgba(240,235,210,0.90);
  text-align: center;
  letter-spacing: 4px;
  text-transform: uppercase;
  text-shadow:
    2px 2px 0 rgba(0,0,0,0.3),
    0 0 40px rgba(240,235,210,0.08);
  margin-top: 10px;
  line-height: 1.1;
}

.divider-top {
  display: flex; align-items: center; gap: 12px;
  margin: 14px 0 8px;
  width: 100%; max-width: 520px;
}
.divider-line {
  flex: 1; height: 1.5px;
  background: linear-gradient(90deg, transparent, rgba(240,235,210,0.35), transparent);
}
.divider-ornament {
  font-family: 'Fredericka the Great', serif;
  font-size: 18px; color: rgba(240,235,210,0.50);
}

.board-subtitle {
  font-family: 'Caveat', cursive;
  font-size: clamp(18px, 3.5vw, 30px);
  color: rgba(240,235,210,0.65);
  text-align: center;
  letter-spacing: 2px;
  margin-bottom: 18px;
}

/* ── Specials List ──────────────────────────────────────────────── */
#specialsList {
  width: 100%; max-width: 560px; flex: 1;
  display: flex; flex-direction: column;
  gap: clamp(10px, 2vh, 22px);
  overflow: hidden;
}

.special-item {
  display: flex; flex-direction: column; align-items: center;
  text-align: center;
  padding: clamp(8px, 1.5vh, 16px) 16px;
  position: relative;
}

.special-category {
  font-family: 'Caveat', cursive;
  font-size: clamp(12px, 1.8vw, 18px);
  color: rgba(240,235,210,0.45);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.special-title {
  font-family: 'Fredericka the Great', serif;
  font-size: clamp(20px, 4vw, 40px);
  color: rgba(240,235,210,0.95);
  line-height: 1.15;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
}

.special-desc {
  font-family: 'Caveat', cursive;
  font-size: clamp(14px, 2.2vw, 22px);
  color: rgba(240,235,210,0.65);
  margin-top: 3px;
  line-height: 1.3;
}

.special-price {
  font-family: 'Fredericka the Great', serif;
  font-size: clamp(18px, 3vw, 30px);
  color: rgba(212,175,100,0.90);
  margin-top: 4px;
  text-shadow: 0 0 20px rgba(212,175,100,0.2);
}

.special-sep {
  width: 80px; height: 1px;
  background: rgba(240,235,210,0.18);
  margin: 0 auto;
}

/* ── Empty state ────────────────────────────────────────────────── */
.board-empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
}
.board-empty-text {
  font-family: 'Fredericka the Great', serif;
  font-size: clamp(20px, 3.5vw, 36px);
  color: rgba(240,235,210,0.35);
  text-align: center;
}
.board-empty-sub {
  font-family: 'Caveat', cursive;
  font-size: clamp(14px, 2vw, 22px);
  color: rgba(240,235,210,0.20);
}

/* ── Bottom footer ──────────────────────────────────────────────── */
.board-footer {
  margin-top: auto; padding-top: 16px;
  font-family: 'Caveat', cursive;
  font-size: clamp(12px, 1.8vw, 18px);
  color: rgba(240,235,210,0.30);
  text-align: center;
  letter-spacing: 2px;
}

/* ── Refresh indicator (subtle, bottom-right) ───────────────────── */
.refresh-dot {
  position: fixed; bottom: 10px; right: 14px;
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(240,235,210,0.15);
  transition: background 0.5s;
}
.refresh-dot.pulse { background: rgba(240,235,210,0.50); }
</style>
</head>
<body>
<div class="board">
  <div class="board-logo">Red Nun</div>
  <div class="divider-top">
    <div class="divider-line"></div>
    <div class="divider-ornament">✦</div>
    <div class="divider-line"></div>
  </div>
  <div class="board-subtitle">Tonight's Specials</div>

  <div id="specialsList">
    <!-- Loaded by JS -->
  </div>

  <div class="board-footer" id="boardFooter"></div>
</div>

<div class="refresh-dot" id="refreshDot"></div>

<script>
const REFRESH_MS = 60000; // 60 seconds

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render(specials) {
  const list = document.getElementById('specialsList');

  if (!specials || !specials.length) {
    list.innerHTML = `
      <div class="board-empty">
        <div class="board-empty-text">No specials tonight</div>
        <div class="board-empty-sub">Check back soon</div>
      </div>`;
    return;
  }

  const items = specials.map((s, i) => {
    const isLast = i === specials.length - 1;
    return `
      <div class="special-item">
        ${s.category ? `<div class="special-category">${esc(s.category)}</div>` : ''}
        <div class="special-title">${esc(s.title)}</div>
        ${s.description ? `<div class="special-desc">${esc(s.description)}</div>` : ''}
        ${s.price ? `<div class="special-price">${esc(s.price)}</div>` : ''}
      </div>
      ${!isLast ? '<div class="special-sep"></div>' : ''}`;
  }).join('');

  list.innerHTML = items;

  // Dynamic font scaling: if many items, shrink them
  const count = specials.length;
  if (count >= 6) {
    document.querySelectorAll('.special-title').forEach(el => {
      el.style.fontSize = 'clamp(16px, 3vw, 28px)';
    });
    document.querySelectorAll('.special-desc').forEach(el => {
      el.style.fontSize = 'clamp(11px, 1.8vw, 17px)';
    });
  }
}

async function refresh() {
  const dot = document.getElementById('refreshDot');
  dot.classList.add('pulse');
  setTimeout(() => dot.classList.remove('pulse'), 800);

  try {
    const resp = await fetch('/api/specials?active=1&_=' + Date.now());
    const specials = await resp.json();
    render(specials);

    const footer = document.getElementById('boardFooter');
    if (specials.length) {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
      footer.textContent = 'Ask your server about our specials · ' + timeStr;
    } else {
      footer.textContent = '';
    }
  } catch(e) {
    // Silent fail — board stays showing last known state
    console.warn('Refresh failed:', e);
  }
}

// Initial load
refresh();

// Auto-refresh every 60 seconds
setInterval(refresh, REFRESH_MS);
</script>
</body>
</html>
